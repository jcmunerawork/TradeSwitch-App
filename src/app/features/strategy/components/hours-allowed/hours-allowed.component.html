<div class="config-row d-flex flex-col py-12 justify-between">
  <div class="d-flex justify-between mb-4">
    <div class="d-flex items-center">
      <label class="custom-checkbox m-6">
        <input
          type="checkbox"
          id="toggle-hours-allowed"
          [checked]="config.isActive"
          (change)="onToggleActive($event)"
        />
        <span class="checkmark"></span>
      </label>

      <span
        [ngClass]="{ deactivated: !config.isActive }"
        class="rule-label"
        >Trades allowed during</span
      >
    </div>
    <div class="timezone-select-wrapper">
      @if (isMyChoices) {
        <span
          class="timezone-info-icon"
          (mouseenter)="showTimezoneTooltip = true"
          (mouseleave)="showTimezoneTooltip = false"
          (click)="showTimezoneTooltip = !showTimezoneTooltip"
          aria-label="Information about timezone"
        >
          i
          @if (showTimezoneTooltip) {
            <div class="timezone-tooltip">This timezone is where you make your trades (e.g. market or exchange), not your physical location.</div>
          }
        </span>
      }
      <select
        id="timezone"
        [ngModel]="config.timezone"
        [disabled]="!config.isActive"
        (ngModelChange)="onTimezoneChange($event)"
        class="timezone-select inputText color-light-gray"
      >
        <option value="" disabled>Select timezone</option>
        @for (tz of timezones; track $index) {
        <option [value]="tz.value">
          {{ tz.label }}
        </option>
        }
      </select>
    </div>
  </div>

  <div class="d-flex time-inputs-row">
    <div class="time-input-row">
      <app-scroll-time-picker
        [value]="config.tradingOpenTime"
        [placeholder]="config.isActive ? 'Select start time' : '--:--'"
        [disabled]="!config.isActive"
        (valueChange)="onTimeChange('tradingOpenTime', $event)"
      />
    </div>
    <div class="time-input-row">
      <app-scroll-time-picker
        [value]="config.tradingCloseTime"
        [placeholder]="config.isActive ? 'Select end time' : '--:--'"
        [disabled]="!config.isActive"
        (valueChange)="onTimeChange('tradingCloseTime', $event)"
      />
    </div>
  </div>
</div>
